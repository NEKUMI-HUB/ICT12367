{% extends "base.html"%}

{% block title %}
<title>แบบฟอร์มบันทึกข้อมูลประชากร</title>
    <style>
        body {
            background-color: #fff5f7; /* สีพื้นหลังชมพูอ่อนแบบซากุระ */
            font-family: 'Zen Maru Gothic', 'Noto Sans Thai', sans-serif;
            color: #4a4a4a;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white;
            text-align: center;
            padding: 2rem;
            border-bottom: none;
        }

        .form-label {
            font-weight: 700;
            color: #ff748c;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #ffe0e6;
            padding: 10px 15px;
        }

        .form-control:focus {
            border-color: #ffb6c1;
            box-shadow: 0 0 0 0.25rem rgba(255, 182, 193, 0.25);
        }

        .btn-submit {
            background-color: #3aebb3;
            border: none;
            border-radius: 10px;
            padding: 10px 30px;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #01ce31;
            transform: translateY(-2px);
        }

        .btn-clear {
            background-color: #6d0118; /* สีฟ้าสดใส */
            border: none;
            border-radius: 10px;
            padding: 10px 30px;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-clear:hover {
            background-color: #e60000;
            transform: translateY(-2px);
        }

        .decoration-flower {
            font-size: 1.5rem;
            margin: 0 10px;
        }
    </style>
{% endblock %}

{% block content %}




<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h2 class="mb-0">
                        <span class="decoration-flower">🌸</span>
                        ลงทะเบียนใหม่
                        <span class="decoration-flower">🌸</span>
                    </h2>
                    <p class="small mt-2">Welcome to our community (ようこそ!)</p>
                </div>
                <div class="card-body p-4">
                    <form id="registrationForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">ชื่อ - นามสกุล (お名前)</label>
                            <input type="text" class="form-control" id="name" placeholder="กรอกชื่อของคุณ" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">อีเมล (メール)</label>
                            <input type="email" class="form-control" id="email" placeholder="example@mail.com" required>
                        </div>

                        <div class="mb-4">
                            <label for="age" class="form-label">อายุ (年齢)</label>
                            <input type="number" class="form-control" id="age" min="1" max="120" placeholder="ระบุอายุ">
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                            <button type="submit" class="btn btn-submit me-md-2">บันทึกข้อมูล (送信)</button>
                            <button type="reset" class="btn btn-clear">ล้างข้อมูล (クリア)</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>


{% endblock %}
