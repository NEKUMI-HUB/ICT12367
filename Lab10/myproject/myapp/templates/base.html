<!DOCTYPE html>
<html lang="th">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
        <style>
        :root{--accent:#b32f7f;--accent2:#ffdfe9;--nav-bg:linear-gradient(90deg,#f8e7f2, #ddb2c5);}    
        body{font-family:'Noto Sans JP',sans-serif;background:#fff;color:#333;margin:0;padding:0}
        /* Top header / nav */
        .site-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--nav-bg);box-shadow:0 4px 14px rgba(0,0,0,0.06);border-bottom:4px solid rgba(179,47,127,0.06)}
        .brand{display:flex;align-items:center;gap:12px}
        .brand .logo{width:40px;height:40px;background:radial-gradient(circle at 30% 20%,#ffe6f2,#ffb3db);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#6b1033}
        .brand .title{font-weight:900;color:#3b0f25}
        nav.site-nav{display:flex;gap:14px}
        nav.site-nav a{color:#3b0f25;text-decoration:none;padding:8px 12px;border-radius:10px;font-weight:700}
        nav.site-nav a:hover{background:rgba(179,47,127,0.08)}
        
        .hero{background-image:url('https://4kwallpapers.com/images/walls/thumbs_3t/25706.jpg');background-size:cover;background-position:center;color:#000000;padding:48px 20px;text-align:center}
        .hero h1{font-size:32px;margin:0 0 8px}
        .hero p{margin:0;color:rgba(64, 0, 0, 0.92)}

        .container{max-width:1000px;margin:24px auto;padding:0 16px}
        footer{background:#111;color:#ddd;padding:14px;text-align:center;margin-top:28px}
        @media (max-width:760px){nav.site-nav{display:none}}
        </style>

        {% block title %}

        {% endblock %}

</head>
<body>
    <header class="site-header">
        <div class="brand">
            <div class="logo">祭</div>
            <div class="title">ICT12367 SPU</div>
        </div>
        <nav class="site-nav">
            <a href="/">หน้าแรก</a>
            <a href="/about">เกี่ยวกับเรา</a>
            <a href="/form">แบบฟอร์ม</a>
        </nav>
        <div class="actions">
        </div>
    </header>

    <div class="hero">
        <h1>ยินดีต้อนรับสู่ชุมชนญี่ปุ่นและอนิเมะ</h1>
        <p>รวมคอนเทนต์ แนะนำ และกิจกรรมเกี่ยวกับวัฒนธรรมญี่ปุ่น</p>
    </div>

    <div class="container">
        {% block content %}

        {% endblock %}
    </div>

    <footer>© 2024 ICT12367 SPU</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
